    --ink:#16202e;
    --ink-soft:#48566a;
    --paper:#eceee8;
    --card:#ffffff;
    --wave:#0e7490;        /* sound / primary */
    --wave-deep:#0b5566;
    --amp:#e8590c;         /* energy / numbers */
    --reso:#6d28d9;        /* resonance / special */
    --line:#d6d9d1;
    --good:#108a5b;
    --bad:#c0392b;
    --shadow:0 1px 0 rgba(22,32,46,.04), 0 8px 24px -16px rgba(22,32,46,.35);
    --r:14px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:"Noto Sans Malayalam",sans-serif;
    line-height:1.7;-webkit-font-smoothing:antialiased;
  }
  .ml-display{font-family:"Noto Sans Malayalam","Noto Sans Malayalam",sans-serif;}
  .mono{font-family:"Space Mono","Noto Sans Malayalam",monospace;}
  .wrap{max-width:900px;margin:0 auto;padding:0 18px;}

  /* ---------- header ---------- */
  .brandbar{background:#fff;padding:9px 16px 7px;text-align:center;}
  .brand-logo{height:40px;aspect-ratio:760/274;margin:0 auto;background:var(--logo) center/contain no-repeat;}
  @media(max-width:560px){.brand-logo{height:32px;}}
  header{
    background:var(--ink);color:#eef2f6;position:relative;
    border-bottom:3px solid var(--wave);
  }
  .scope{
    position:absolute;inset:0;width:100%;height:100%;opacity:.5;
  }
  .scope path{fill:none;stroke:var(--wave);stroke-width:2.2;}
  .scope .glow{stroke:#19c5d8;stroke-width:1.2;opacity:.7;}
  @keyframes drift{from{transform:translateX(0);}to{transform:translateX(-220px);}}
  .scope g{animation:drift 6s linear infinite;}
  .hero{position:relative;z-index:2;padding:22px 18px 26px;max-width:900px;margin:0 auto;text-align:center;}
  .eyebrow{
    font-family:"Space Mono","Noto Sans Malayalam",monospace;font-size:12px;letter-spacing:2px;
    text-transform:uppercase;color:#5fd6e3;margin:0 0 8px;
  }
  .hero h1{
    font-family:"Noto Sans Malayalam",sans-serif;font-weight:800;
    font-size:clamp(34px,7vw,56px);margin:0;line-height:1.05;letter-spacing:-.5px;color:#eef2f6;
  }
  .hero .sub{margin:10px 0 0;color:#aebccb;font-size:15px;max-width:540px;}
  .hero .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;}
  .pill{
    font-family:"Space Mono","Noto Sans Malayalam",monospace;font-size:11px;letter-spacing:.5px;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);
    color:#cfe0ec;padding:5px 11px;border-radius:30px;
  }

  /* ---------- tabs ---------- */
  nav.tabs{
    position:sticky;top:0;z-index:30;background:var(--paper);
    border-bottom:1px solid var(--line);
  }
  .tabwrap{max-width:900px;margin:0 auto;display:flex;gap:2px;overflow-x:auto;padding:0 10px;}
  .tabwrap::-webkit-scrollbar{height:0;}
  .tab{
    flex:0 0 auto;border:none;background:none;cursor:pointer;
    font-family:"Noto Sans Malayalam",sans-serif;font-weight:600;font-size:15.5px;
    color:var(--ink-soft);padding:14px 14px 11px;border-bottom:3px solid transparent;
    white-space:nowrap;transition:color .15s;
  }
  .tab:hover{color:var(--ink);}
  .tab.active{color:var(--wave-deep);border-bottom-color:var(--wave);}

  /* ---------- panels ---------- */
  .panel{display:none;padding:30px 0 70px;}
  .panel.active{display:block;animation:fade .35s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  .lead{font-size:16px;color:var(--ink-soft);margin:0 0 26px;}

  /* notes accordion */
  details.topic{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden;
  }
  details.topic[open]{border-color:var(--wave);}
  summary{
    list-style:none;cursor:pointer;padding:16px 18px;display:flex;align-items:center;gap:14px;
  }
  summary::-webkit-details-marker{display:none;}
  .tnum{
    font-family:"Space Mono","Noto Sans Malayalam",monospace;font-weight:700;font-size:13px;
    color:#fff;background:var(--wave);min-width:30px;height:30px;border-radius:8px;
    display:grid;place-items:center;flex:0 0 auto;
  }
  details[open] .tnum{background:var(--amp);}
  .ttitle{font-family:"Noto Sans Malayalam",sans-serif;font-weight:700;font-size:18px;flex:1;line-height:1.25;}
  .chev{transition:transform .2s;color:var(--ink-soft);font-size:13px;}
  details[open] .chev{transform:rotate(90deg);}
  .tbody{padding:2px 18px 20px 18px;border-top:1px solid var(--line);}
  .tbody p{margin:14px 0 0;}
  .tbody ul{margin:12px 0 0;padding-left:0;list-style:none;}
  .tbody li{position:relative;padding-left:22px;margin:7px 0;}
  .tbody li::before{
    content:"";position:absolute;left:4px;top:12px;width:8px;height:8px;
    border-radius:50%;background:var(--wave);
  }
  .def{
    background:#f0f8f9;border-left:4px solid var(--wave);border-radius:0 10px 10px 0;
    padding:12px 16px;margin:14px 0 0;
  }
  .def b{color:var(--wave-deep);}
  .tag{
    display:inline-block;font-family:"Space Mono","Noto Sans Malayalam",monospace;font-size:11px;
    background:#fdf0e7;color:var(--amp);border:1px solid #f6cead;
    padding:2px 8px;border-radius:6px;margin:2px 4px 2px 0;
  }
  .eng{color:var(--ink-soft);font-style:italic;}

  /* formula cards */
  .fgrid{display:grid;grid-template-columns:1fr;gap:16px;}
  .fcard{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:20px 22px;box-shadow:var(--shadow);
  }
  .fcard .fname{font-family:"Noto Sans Malayalam",sans-serif;font-weight:600;font-size:16px;color:var(--ink-soft);margin:0 0 12px;}
  .formula{
    font-family:"Space Mono","Noto Sans Malayalam",monospace;font-weight:700;
    font-size:clamp(24px,5vw,32px);color:var(--wave-deep);
    background:#f4fafb;border:1px dashed var(--wave);border-radius:10px;
    padding:14px 18px;text-align:center;letter-spacing:1px;
  }
  .where{margin-top:14px;display:grid;gap:6px;}
  .where div{font-size:14.5px;}
  .where .sym{font-family:"Space Mono","Noto Sans Malayalam",monospace;color:var(--amp);font-weight:700;}

  /* flashcards */
  .fcwrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
  .flip{
    perspective:1200px;height:160px;cursor:pointer;
  }
  .flip-inner{
    position:relative;width:100%;height:100%;transition:transform .55s;
    transform-style:preserve-3d;
  }
  .flip.on .flip-inner{transform:rotateY(180deg);}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    padding:18px;text-align:center;box-shadow:var(--shadow);
  }
  .face.front{background:var(--card);border:1px solid var(--line);}
  .face.front .term{font-family:"Noto Sans Malayalam",sans-serif;font-weight:700;font-size:19px;color:var(--ink);}
  .face.front .en{font-size:12.5px;color:var(--ink-soft);margin-top:6px;font-style:italic;}
  .face.front .hint{position:absolute;bottom:10px;font-family:"Space Mono","Noto Sans Malayalam",monospace;font-size:10px;color:var(--wave);letter-spacing:1px;}
  .face.back{
    background:var(--wave-deep);color:#eafafb;transform:rotateY(180deg);
    border:1px solid var(--wave-deep);font-size:14.5px;line-height:1.55;
  }

  /* quiz */
  .quiz-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:var(--shadow);padding:24px;max-width:680px;margin:0 auto;
  }
  .qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .qcount{font-family:"Space Mono","Noto Sans Malayalam",monospace;font-size:12px;color:var(--ink-soft);letter-spacing:1px;}
  .qscore{font-family:"Space Mono","Noto Sans Malayalam",monospace;font-size:12px;color:var(--amp);font-weight:700;}
  .qbar{height:6px;background:#e7eae3;border-radius:6px;overflow:hidden;margin-bottom:18px;}
  .qbar i{display:block;height:100%;background:var(--wave);transition:width .3s;}
  .qtext{font-family:"Noto Sans Malayalam",sans-serif;font-weight:600;font-size:19px;line-height:1.4;margin:0 0 18px;}
  .opt{
    display:block;width:100%;text-align:right;direction:rtl;
    background:#f6f8f3;border:2px solid var(--line);border-radius:11px;
    padding:13px 16px;margin:9px 0;cursor:pointer;font-family:"Noto Sans Malayalam",sans-serif;
    font-size:15.5px;color:var(--ink);transition:all .15s;
  }
  .opt:hover:not(:disabled){border-color:var(--wave);background:#eef7f8;}
  .opt:disabled{cursor:default;}
  .opt.correct{border-color:var(--good);background:#e7f6ee;color:#0a5e3d;font-weight:600;}
  .opt.wrong{border-color:var(--bad);background:#fbecea;color:#8e2118;}
  .qfb{margin-top:14px;padding:12px 15px;border-radius:10px;font-size:14.5px;display:none;}
  .qfb.show{display:block;}
  .qfb.ok{background:#e7f6ee;color:#0a5e3d;border-left:4px solid var(--good);}
  .qfb.no{background:#fbecea;color:#8e2118;border-left:4px solid var(--bad);}
  .qnext{
    margin-top:18px;width:100%;border:none;cursor:pointer;
    background:var(--wave);color:#fff;font-family:"Noto Sans Malayalam",sans-serif;
    font-weight:700;font-size:16px;padding:13px;border-radius:11px;transition:background .15s;
  }
  .qnext:hover{background:var(--wave-deep);}
  .qnext[disabled]{background:#aeb8c2;cursor:not-allowed;}
  .result{text-align:center;padding:14px 0;}
  .result .big{font-family:"Space Mono","Noto Sans Malayalam",monospace;font-weight:700;font-size:54px;color:var(--wave-deep);line-height:1;}
  .result .lbl{font-family:"Noto Sans Malayalam",sans-serif;font-weight:600;font-size:20px;margin-top:8px;}
  .result .msg{color:var(--ink-soft);margin-top:6px;}
  .retry{margin-top:20px;background:var(--amp);color:#fff;border:none;cursor:pointer;
    font-family:"Noto Sans Malayalam",sans-serif;font-weight:700;font-size:15px;padding:11px 26px;border-radius:10px;}
  .q-share{margin:20px auto 4px;display:flex;flex-direction:column;gap:11px;align-items:center;
    max-width:340px;border-top:1px dashed var(--line);padding-top:20px;}
  .q-share .q-cap{font-family:"Noto Sans Malayalam",sans-serif;font-weight:700;font-size:14px;color:var(--ink-soft);}
  .q-share input{width:100%;padding:11px 14px;border:1px solid var(--line);border-radius:10px;
    font-family:"Noto Sans Malayalam",sans-serif;font-size:15px;text-align:center;background:#fafbf8;}
  .q-share input:focus{outline:none;border-color:#25D366;}
  .q-wa{background:#25D366;color:#fff;border:none;cursor:pointer;font-family:"Noto Sans Malayalam",sans-serif;
    font-weight:700;font-size:15px;padding:12px 26px;border-radius:11px;display:inline-flex;align-items:center;gap:8px;width:100%;justify-content:center;}
  .q-wa:hover{background:#1da851;}
  .q-share-msg{font-size:13px;color:var(--ink-soft);min-height:16px;}

let qi=0,score=0,answered=false;
const qc=document.getElementById('quizCard');
function renderQ(){
  answered=false;
  const item=quiz[qi], en=L()==='en';
  let opts=(en?item.oe:item.o).map((o,i)=>`<button class="opt" data-i="${i}">${o}</button>`).join('');
  qc.innerHTML=`
    <div class="qmeta">
      <span class="qcount">${en?'Question':'ചോദ്യം'} ${qi+1} / ${quiz.length}</span>
      <span class="qscore">${en?'Score':'സ്കോർ'}: ${score}</span>
    </div>
    <div class="qbar"><i style="width:${(qi)/quiz.length*100}%"></i></div>
    <p class="qtext">${en?item.qe:item.q}</p>
    <div id="opts">${opts}</div>
    <div class="qfb" id="qfb"></div>
    <button class="qnext" id="qnext" disabled>${qi===quiz.length-1?(en?'See result ▸':'ഫലം കാണാം ▸'):(en?'Next question ▸':'അടുത്ത ചോദ്യം ▸')}</button>`;
  qc.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',pick));
  document.getElementById('qnext').addEventListener('click',()=>{qi++;qi<quiz.length?renderQ():showResult();});
}
function pick(e){
  if(answered)return; answered=true;
  const chosen=+e.target.dataset.i, correct=quiz[qi].a;
  qc.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===correct)b.classList.add('correct');
    if(i===chosen&&chosen!==correct)b.classList.add('wrong');
  });
  const fb=document.getElementById('qfb');
  if(chosen===correct){score++;fb.className='qfb show ok';fb.innerHTML=(L()==='en'?'✓ Correct! ':'✓ ശരി! ')+(L()==='en'?quiz[qi].fbe:quiz[qi].fb);}
  else{fb.className='qfb show no';fb.innerHTML='✗ '+(L()==='en'?quiz[qi].fbe:quiz[qi].fb);}
  document.querySelector('.qscore').textContent=(L()==='en'?'Score: ':'സ്കോർ: ')+score;
  document.getElementById('qnext').disabled=false;
}
function showResult(){
  const pct=Math.round(score/quiz.length*100);
  const en=L()==='en'; let msg= pct>=80?(en?'Excellent! Well studied 🌟':'മികച്ചത്! നന്നായി പഠിച്ചു 🌟'): pct>=50?(en?'Good progress — revise once more 👍':'നന്നായി വരുന്നു — ഒന്നു കൂടി റിവിഷൻ ചെയ്യാം 👍'):(en?'Read the notes again and retry 📘':'കുറിപ്പുകൾ ഒന്നുകൂടി വായിച്ച് വീണ്ടും ശ്രമിക്കാം 📘');
  qc.innerHTML=`<div class="result">
    <div class="big">${score}<span style="font-size:24px;color:var(--ink-soft)">/${quiz.length}</span></div>
    <div class="lbl">${pct}% ${en?'correct':'ശരി'}</div>
    <div class="msg">${msg}</div>
    <div class="q-share">
      <div class="q-cap">${en?'📲 Send result to teacher / group':'📲 ഫലം ടീച്ചർക്ക് / ഗ്രൂപ്പിൽ അയക്കാം'}</div>
      <input id="qName" placeholder="${en?'Your name':'നിങ്ങളുടെ പേര്'}" autocomplete="name">
      <button class="q-wa" id="qWA">${en?'📲 Share on WhatsApp':'📲 WhatsApp-ൽ ഷെയർ ചെയ്യാം'}</button>
      <div class="q-share-msg" id="qShareMsg"></div>
    </div>
    <button class="retry" id="retry">${en?'Try again ↻':'വീണ്ടും ശ്രമിക്കാം ↻'}</button>
  </div>`;
  document.getElementById('qWA').addEventListener('click',shareWA);
  document.getElementById('qName').addEventListener('keydown',e=>{if(e.key==='Enter')shareWA();});
  document.getElementById('retry').addEventListener('click',()=>{qi=0;score=0;renderQ();});
}

/* ---------- WhatsApp result share ---------- */
const TEACHER_WA=''; // ഉദാ '919876543210' (രാജ്യകോഡ് സഹിതം, + വേണ്ട). ശൂന്യമെങ്കിൽ ഷെയർ പിക്കർ തുറക്കും.
function shareWA(){
  const name=document.getElementById('qName').value.trim();
  const sm=document.getElementById('qShareMsg');
  if(!name){sm.textContent=T('⚠️ പേര് നൽകൂ.','⚠️ Enter your name.');return;}
  const pct=Math.round(score/quiz.length*100);
  const d=new Date().toLocaleDateString('en-GB');
  const en=L()==='en';
  const txt=`*${en?'Sound Waves — Quiz Result':'ശബ്ദതരംഗങ്ങൾ — ക്വിസ് ഫലം'}*\n`+
            `${en?'Name':'പേര്'}: ${name}\n`+
            `${en?'Score':'സ്കോർ'}: ${score}/${quiz.length} (${pct}%)\n`+
            `${en?'Date':'തീയതി'}: ${d}\n`+
            `_CLASS 10 · ${en?'PHYSICS':'ഭൗതികശാസ്ത്രം'}_`;
  const base=TEACHER_WA?`https://wa.me/${TEACHER_WA}`:'https://wa.me/';

}

function setLang(lang){
  document.body.classList.toggle('lang-en',lang==='en');
  document.body.classList.toggle('lang-ml',lang!=='en');
  document.querySelectorAll('.langtog button').forEach(b=>b.classList.toggle('on',b.dataset.lang===lang));
  try{localStorage.setItem('swlang',lang);}catch(e){}
  qi=0;score=0;renderQ();
  updateLive();
}
document.querySelectorAll('.langtog button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));

/* ---------- time gate: 9:30 PM – 10:30 PM (device local time) ---------- */
const LIVE_START=21*60+30, LIVE_END=22*60+30;
function liveOpen(){const d=new Date();const m=d.getHours()*60+d.getMinutes();return m>=LIVE_START&&m<LIVE_END;}
function nextOpenMs(){
  const now=new Date();
  const o=new Date(now); o.setHours(21,30,0,0);
  if(now>=o){const e=new Date(now); e.setHours(22,30,0,0); if(now<e)return 0; o.setDate(o.getDate()+1);}
  return o-now;
}
function fmtDur(ms){let s=Math.floor(ms/1000);const h=Math.floor(s/3600);s%=3600;const m=Math.floor(s/60);s%=60;
  const z=n=>String(n).padStart(2,'0');return z(h)+':'+z(m)+':'+z(s);}
let liveWasOpen=null;
function updateLive(){
  const en=L()==='en';
  const banner=document.getElementById('liveBanner');
  const locked=document.getElementById('liveLocked');
  const card=document.getElementById('quizCard');
  banner.style.display='block';
  banner.textContent=en?'🔴 LIVE QUIZ · 9:30 PM – 10:30 PM':'🔴 ലൈവ് ക്വിസ് · രാത്രി 9:30 – 10:30';
  if(liveOpen()){
    locked.style.display='none';
    card.style.display='';
    if(liveWasOpen===false){qi=0;score=0;renderQ();}
    liveWasOpen=true;
  }else{
    card.style.display='none';
    locked.style.display='block';
    liveWasOpen=false;
    document.getElementById('llTitle').textContent=en?'Quiz is not open right now':'ഇപ്പോൾ ക്വിസ് തുറന്നിട്ടില്ല';
    document.getElementById('llSub').textContent=en?'Available every day from 9:30 PM to 10:30 PM':'എല്ലാ ദിവസവും രാത്രി 9:30 മുതൽ 10:30 വരെ';
    document.getElementById('llCountLabel').textContent=en?'Opens in':'തുറക്കാൻ ബാക്കി';
    document.getElementById('llCount').textContent=fmtDur(nextOpenMs());
    document.getElementById('llNote').textContent=en?'Keep this page open — it unlocks automatically.':'ഈ പേജ് തുറന്നുതന്നെ വെക്കൂ.';
  }
}
