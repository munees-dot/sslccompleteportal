<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arithmetic Sequences Quiz | സമാന്തരശ്രേണികൾ ക്വിസ്</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --ink:#1f2937;
  --paper:#f4f2fb;
  --chain:#4a3f9e;
  --chain-dark:#2c2566;
  --branch:#e0793a;
  --branch-light:#fdeadb;
  --func:#0e8f8f;
  --line:#dcd8ee;
  --card:#ffffff;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:'Segoe UI',system-ui,sans-serif;
  line-height:1.6;
  min-height:100vh;
}
header{
  background:linear-gradient(135deg,var(--chain-dark),var(--chain) 65%);
  color:#fff;
  padding:18px 16px 40px;
  position:relative;
  overflow:hidden;
  text-align:center;
}
header .backbone{
  position:absolute; inset:0; opacity:.15;
  background-image:
    repeating-linear-gradient(115deg, transparent 0 38px, #fff 38px 40px);
}
header img{ max-height:56px; margin-bottom:8px; position:relative; z-index:1; }
header h1{ margin:0 0 4px; font-size:1.3rem; position:relative; z-index:1; }
header p.sub{ margin:0; opacity:.9; font-size:.85rem; position:relative; z-index:1; }

.wrap{ max-width:600px; margin:-28px auto 30px; padding:0 14px; position:relative; z-index:2; }

.card{
  background:var(--card); border:1px solid var(--line);
  border-radius:16px; padding:22px 20px; margin-bottom:16px;
  box-shadow:0 8px 24px rgba(44,37,102,.14);
}

#langBtn{
  display:block; margin:0 auto 14px; background:var(--func); color:#fff;
  border:none; padding:8px 16px; border-radius:20px; cursor:pointer;
  font-size:.8rem; font-weight:600; font-family:inherit;
}

.progress-wrap{ margin-bottom:16px; }
.progress-label{ font-size:.8rem; color:var(--chain-dark); font-weight:600; margin-bottom:6px; display:flex; justify-content:space-between; }
.progress-bar{ background:#eee6fb; border-radius:20px; height:10px; overflow:hidden; }
.progress-fill{ background:linear-gradient(90deg,var(--func),var(--chain)); height:100%; border-radius:20px; transition:width .3s ease; width:0%; }

.q-text{ font-size:1.08rem; font-weight:700; color:var(--chain-dark); margin:6px 0 18px; min-height:52px; }

.opts button{
  display:block; width:100%; text-align:left; margin:8px 0; padding:12px 14px;
  border:1.5px solid var(--line); background:#fff; border-radius:10px; cursor:pointer;
  font-family:inherit; font-size:.98rem; transition:.15s;
}
.opts button:hover{ border-color:var(--chain); background:#f7f6fd; }
.opts button.correct{ background:#dff3e8; border-color:var(--func); font-weight:700; }
.opts button.wrong{ background:#fbe4e0; border-color:var(--branch); }
.opts button[disabled]{ cursor:default; }

.nav-row{ display:flex; justify-content:space-between; margin-top:18px; gap:10px; }
.btn{
  background:var(--branch); color:#fff; border:none; padding:11px 18px;
  border-radius:10px; cursor:pointer; font-family:inherit; font-weight:700;
  font-size:.95rem; flex:1;
}
.btn.secondary{ background:var(--chain); }
.btn[disabled]{ opacity:.4; cursor:not-allowed; }

.score-screen{ text-align:center; }
.score-screen .big-score{ font-size:2.6rem; font-weight:800; color:var(--chain-dark); margin:10px 0; }
.score-screen .msg{ font-size:1rem; color:var(--func); margin-bottom:18px; font-weight:600; }

.share-row{ display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; justify-content:center; }
.share-row a, .share-row button{
  text-decoration:none; background:#25d366; color:#fff; padding:10px 16px;
  border-radius:10px; font-size:.88rem; font-weight:700; border:none; cursor:pointer;
  font-family:inherit; display:inline-flex; align-items:center; gap:6px;
}
.share-row button.copy{ background:var(--chain); }
.share-row a.backlink{ background:var(--chain-dark); }

footer.note{ text-align:center; font-size:.75rem; color:#7a749c; margin:20px 0 10px; }
.i18n-hidden{ display:none; }
</style>
</head>

  { q:{en:"What number would come next after 24, 42 if the common difference is 18?", ml:"പൊതുവ്യത്യാസം 18 ആണെങ്കിൽ 24, 42 എന്നിവയ്ക്കു ശേഷം വരുന്ന സംഖ്യ ഏതാണ്?"}, opts:["50","54","60","66"], ans:2 },
  { q:{en:"In an AP, x₃=15 and x₈=35. Find the common difference.", ml:"ഒരു ശ്രേണിയിൽ x₃=15 ഉം x₈=35 ഉം ആണ്. പൊതുവ്യത്യാസം കണ്ടെത്തുക."}, opts:["3","4","5","6"], ans:1 },
  { q:{en:"Sum of any 3 consecutive terms of an AP equals:", ml:"ഒരു ശ്രേണിയിലെ ഏതെങ്കിലും 3 തുടർച്ചയായ പദങ്ങളുടെ തുക എന്താണ്?"}, opts:["3 × 1st term","3 × middle term","3 × last term","1st + last term"], ans:1 },
  { q:{en:"Sum of any 5 consecutive terms of an AP equals:", ml:"ഒരു ശ്രേണിയിലെ ഏതെങ്കിലും 5 തുടർച്ചയായ പദങ്ങളുടെ തുക എന്താണ്?"}, opts:["5 × middle term","Sum of extremes","5 × 1st term","2 × middle term"], ans:0 },
  { q:{en:"If x₁₀=25, what is the sum of the 9th and 11th terms?", ml:"x₁₀=25 ആണെങ്കിൽ 9-ാം പദവും 11-ാം പദവും കൂട്ടിയാൽ എത്ര?"}, opts:["25","50","75","100"], ans:1 },
  { q:{en:"If x₁₀=25, what is the sum of the 8th and 12th terms?", ml:"x₁₀=25 ആണെങ്കിൽ 8-ാം പദവും 12-ാം പദവും കൂട്ടിയാൽ എത്ര?"}, opts:["25","40","50","60"], ans:2 },
  { q:{en:"Is 1000 a term of the AP 19, 28, 37, ...?", ml:"19, 28, 37, ... എന്ന ശ്രേണിയിൽ 1000 ഒരു പദമാണോ?"}, opts:["Yes, position 100","Yes, position 109","Yes, position 110","No"], ans:2 },
  { q:{en:"The 4th term of an AP is 81, 6th term is 71. What is the common difference?", ml:"ഒരു ശ്രേണിയുടെ 4-ാം പദം 81 ഉം 6-ാം പദം 71 ഉം ആണ്. പൊതുവ്യത്യാസം എന്താണ്?"}, opts:["-5","5","-10","10"], ans:0 },
  { q:{en:"For the AP in the question above, what is the 20th term?", ml:"മേൽപ്പറഞ്ഞ ശ്രേണിയിലെ 20-ാം പദം എന്താണ്?"}, opts:["-1","0","1","2"], ans:2 },

];

let currentQ = 0;
let score = 0;
let answered = new Array(quizData.length).fill(false);
let selectedOpt = new Array(quizData.length).fill(-1);

document.getElementById('qTotal').textContent = quizData.length;

function renderQuestion(){
  const item = quizData[currentQ];
  document.getElementById('qNum').textContent = currentQ + 1;
  document.getElementById('qText').textContent = item.q[currentLang];
  document.getElementById('progressFill').style.width = ((currentQ) / quizData.length * 100) + '%';
  document.getElementById('scoreVal').textContent = score;

  const optsDiv = document.getElementById('optsContainer');
  optsDiv.innerHTML = '';
  item.opts.forEach((opt, oIdx)=>{
    const b = document.createElement('button');
    b.textContent = opt;
    const wasAnswered = answered[currentQ];
    if(wasAnswered){
      b.disabled = true;
      if(oIdx === item.ans) b.classList.add('correct');
      else if(oIdx === selectedOpt[currentQ]) b.classList.add('wrong');
    }
    b.addEventListener('click', ()=>{
      if(answered[currentQ]) return;
      answered[currentQ] = true;
      selectedOpt[currentQ] = oIdx;
      if(oIdx === item.ans) score++;
      renderQuestion();
    });
    optsDiv.appendChild(b);
  });

  document.getElementById('prevBtn').disabled = (currentQ === 0);
  document.getElementById('nextBtn').textContent = '';
  const nextSpan = document.createElement('span');
  nextSpan.className = 'i18n';
  if(currentQ === quizData.length - 1){
    nextSpan.dataset.en = 'Finish';
    nextSpan.dataset.ml = 'പൂർത്തിയാക്കുക';
    document.getElementById('nextBtn').innerHTML = '<span class="i18n" data-en="Finish" data-ml="പൂർത്തിയാക്കുക">Finish</span> 🏁';
  } else {
    document.getElementById('nextBtn').innerHTML = '<span class="i18n" data-en="Next" data-ml="അടുത്തത്">Next</span> ➡';
  }
  applyLang(currentLang);
}

function nextQuestion(){
  if(!answered[currentQ]) return; // require an answer before moving on
  if(currentQ === quizData.length - 1){
    showScore();
    return;
  }
  currentQ++;
  renderQuestion();
}

function prevQuestion(){
  if(currentQ === 0) return;
  currentQ--;
  renderQuestion();
}

function showScore(){
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('topShareRow').style.display = 'none';
  document.getElementById('scoreCard').style.display = 'block';
  document.getElementById('finalScore').textContent = score;
  document.getElementById('progressFill').style.width = '100%';

  const pct = score / quizData.length;
  const msgEl = document.getElementById('scoreMsg');
  let en, ml;
  if(pct === 1){ en="Perfect score! 🌟"; ml="പെർഫെക്റ്റ് സ്കോർ! 🌟"; }
  else if(pct >= 0.8){ en="Excellent work! 👏"; ml="വളരെ നന്നായി! 👏"; }
  else if(pct >= 0.6){ en="Good job, keep practising!"; ml="നല്ലത്, കൂടുതൽ പരിശീലിക്കുക!"; }
  else { en="Keep practising — you'll improve!"; ml="കൂടുതൽ പരിശീലിക്കുക — മെച്ചപ്പെടും!"; }
  msgEl.dataset.en = en; msgEl.dataset.ml = ml; msgEl.classList.add('i18n');
  applyLang(currentLang);
}

function restartQuiz(){
  currentQ = 0;
  score = 0;
  answered = new Array(quizData.length).fill(false);
  selectedOpt = new Array(quizData.length).fill(-1);
  document.getElementById('quizCard').style.display = 'block';
  document.getElementById('topShareRow').style.display = 'flex';
  document.getElementById('scoreCard').style.display = 'none';
  renderQuestion();
}

function copyLink(){
  navigator.clipboard.writeText(window.location.href).then(()=>{
    alert(currentLang==='ml' ? 'ലിങ്ക് പകർത്തി!' : 'Link copied!');
  }).catch(()=>{
    alert(currentLang==='ml' ? 'പകർത്താൻ കഴിഞ്ഞില്ല.' : 'Could not copy automatically.');
  });
}

function setupShareLinks(){
  const shareText = encodeURIComponent(
    (currentLang==='ml' ? 'സമാന്തരശ്രേണികൾ ക്വിസ് പരീക്ഷിക്കൂ! ' : 'Try this Arithmetic Sequences quiz! ') + window.location.href
  );
  const waUrl = 'https://wa.me/?text=' + shareText;
  document.getElementById('waShareBtn').href = waUrl;
  document.getElementById('waShareBtnTop').href = waUrl;
}

applyLang(currentLang);
renderQuestion();
setupShareLinks();
</script>
